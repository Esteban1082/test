<!DOCTYPE html>
<html lang="fr">
<head>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('pm_auth') !== '1') {
    document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0f0f0d;display:flex;align-items:center;justify-content:center;font-family:DM Mono,monospace;text-align:center;padding:20px"><div><div style="font-size:48px;margin-bottom:16px">🔒</div><div style="font-family:Fraunces,serif;font-size:22px;font-weight:900;color:#e8a045;margin-bottom:8px">Accès restreint</div><div style="font-size:13px;color:#7a7a6e;margin-bottom:24px">Connecte-toi depuis le hub</div><a href="index.html" style="padding:14px 28px;background:#e8a045;border-radius:12px;font-family:Fraunces,serif;font-size:16px;font-weight:700;color:#000;text-decoration:none">← Retour au hub</a></div></div>';
  }
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allergènes – Pâtisserie Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#0f0f0d; --surface:#1a1a16; --border:#2e2e28;
    --text:#f0ede4; --muted:#7a7a6e; --amber:#e8a045;
    --red:#ff4040; --green:#4cdb8a; --yellow:#f5c842;
    --orange:#f08030; --blue:#4db8ff;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }
  button { transition:all .15s; cursor:pointer; }
  button:active { transform:scale(0.97); }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:100;
  }
  .logo-title { font-family:'Fraunces',serif; font-weight:900; font-size:20px; color:var(--amber); }
  .logo-sub   { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .back-btn {
    padding:7px 14px; background:transparent; border:1px solid var(--border);
    border-radius:8px; color:var(--muted); font-family:'DM Mono',monospace;
    font-size:11px; text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .back-btn:hover { border-color:var(--amber); color:var(--text); }

  .main { padding:20px 24px 80px; max-width:800px; margin:0 auto; }

  /* Chips 3 états dans le modal */
  .a-chip {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; border-radius:10px; border:2px solid var(--border);
    background:var(--surface); cursor:pointer; user-select:none;
    transition:all .15s; margin-bottom:8px;
  }
  .a-chip-left { display:flex; align-items:center; gap:10px; font-size:14px; }
  .a-chip-label { font-size:13px; font-weight:500; }
  .a-chip-toggle {
    display:flex; border-radius:8px; overflow:hidden;
    border:1px solid var(--border); flex-shrink:0;
  }
  .a-chip-toggle button {
    padding:6px 12px; font-size:12px; font-weight:700;
    background:transparent; border:none; border-right:1px solid var(--border);
    color:var(--muted); transition:all .15s;
  }
  .a-chip-toggle button:last-child { border-right:none; }
  .a-chip-toggle button.sel-oui  { background:rgba(76,219,138,.2);  color:var(--green); }
  .a-chip-toggle button.sel-non  { background:rgba(255,64,64,.15);   color:var(--red); }
  .a-chip-toggle button.sel-inconnu { background:rgba(245,200,66,.15); color:var(--yellow); }

  /* Badges dans la liste */
  .badge-oui { display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;background:rgba(255,64,64,.12);border:1px solid rgba(255,64,64,.3);color:var(--red);margin:2px }
  .badge-non { display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;background:rgba(76,219,138,.10);border:1px solid rgba(76,219,138,.25);color:var(--green);margin:2px }
  .badge-inconnu { display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;background:rgba(245,200,66,.10);border:1px solid rgba(245,200,66,.25);color:var(--yellow);margin:2px }

  .product-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:16px; margin-bottom:10px;
  }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.8);
    backdrop-filter:blur(4px); z-index:600;
    align-items:flex-end; justify-content:center;
  }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px 20px 0 0; padding:24px; width:100%; max-width:500px;
    max-height:90vh; overflow-y:auto;
  }
  .modal-title { font-family:'Fraunces',serif; font-size:18px; font-weight:700; color:var(--amber); margin-bottom:6px; }
  .form-input {
    width:100%; padding:12px 16px; background:var(--bg);
    border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:'DM Mono',monospace; font-size:14px;
    outline:none; margin-bottom:12px; transition:border-color .15s;
  }
  .form-input:focus { border-color:var(--amber); }

  .filter-chip {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px; border-radius:20px; font-size:12px;
    border:2px solid var(--border); background:var(--surface);
    color:var(--muted); cursor:pointer; transition:all .15s; user-select:none;
  }
  .filter-chip.active { background:rgba(76,219,138,.12); border-color:var(--green); color:var(--green); font-weight:600; }
  .mode-btn {
    padding:8px 16px; border-radius:8px; font-size:12px; letter-spacing:1px;
    text-transform:uppercase; border:1px solid var(--border);
    background:transparent; color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .mode-btn.active { background:var(--amber); color:#000; border-color:var(--amber); font-weight:600; }

  .toast-container { position:fixed; bottom:24px; right:24px; z-index:700; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; animation:slideIn .2s ease; max-width:300px; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:none;opacity:1} }
  .version-tag { position:fixed; bottom:10px; left:14px; font-size:10px; color:var(--border); letter-spacing:1px; z-index:50; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-title">⚠️ Allergènes</div>
    <div class="logo-sub">Pâtisserie Manager</div>
  </div>
  <a class="back-btn" href="index.html">← Hub</a>
</header>

<div class="main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--amber)">Fiches allergènes</div>
    <button onclick="openAddModal()" style="padding:8px 16px;background:var(--amber);border:none;border-radius:8px;font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:#000;">＋ Nouveau</button>
  </div>

  <div style="background:rgba(240,128,48,.08);border:1px solid rgba(240,128,48,.25);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#f08030;line-height:1.6">
    ⚠️ <strong>Réglementation EU 1169/2011</strong> — 14 allergènes à déclaration obligatoire.
    <span style="color:var(--green)">✓ Absent</span> · <span style="color:var(--red)">✗ Présent</span> · <span style="color:var(--yellow)">? Inconnu</span>
  </div>

  <input id="search" type="text" placeholder="🔍 Rechercher un produit…" oninput="renderList()" autocomplete="off"
    style="width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;margin-bottom:12px">

  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="mode-btn active" onclick="setMode('tous',this)">Tous</button>
    <button class="mode-btn" onclick="setMode('sans',this)">🙅 Sans</button>
    <button class="mode-btn" onclick="setMode('avec',this)">⚠️ Avec</button>
  </div>

  <div id="filter-chips-wrap" style="display:none;margin-bottom:12px">
    <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px" id="filter-label"></div>
    <div id="filter-chips" style="display:flex;flex-wrap:wrap;gap:6px"></div>
  </div>

  <div id="stats" style="font-size:12px;color:var(--muted);margin-bottom:14px"></div>
  <div id="list"></div>
</div>

<!-- Modal ajout/édition — feuille remontante -->
<div class="modal-overlay" id="modal-edit" onclick="if(event.target.id==='modal-edit')closeEditModal()">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="modal-title" id="modal-edit-title">＋ Nouvelle fiche</div>
      <button onclick="closeEditModal()" style="padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--muted);">✕</button>
    </div>

    <input id="edit-nom" class="form-input" type="text" placeholder="Nom du gâteau *">
    <input id="edit-patissier" class="form-input" type="text" placeholder="Pâtissier (optionnel)">

    <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">
      Statut de chaque allergène
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap">
      <span style="color:var(--green)">✓ = Absent</span>
      <span style="color:var(--red)">✗ = Présent</span>
      <span style="color:var(--yellow)">? = Inconnu</span>
    </div>

    <div id="chips-edit"></div>

    <div style="margin-top:16px;display:flex;gap:10px">
      <button onclick="closeEditModal()" style="flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;">Annuler</button>
      <button onclick="saveAllergens()" style="flex:1;padding:12px;background:var(--amber);border:none;border-radius:10px;font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:#000;">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<div class="version-tag">allergenes v2.0 · 15/03/2026 18:00</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz425iBOjYC8raof6W44y0IcJlCZHzjOrMzzjw0ju8uXFCKvFSl-xmYi9tZvOoSvP0aZg/exec";

// Les 14 allergènes réglementaires EU
const ALLERGENS = [
  { id:'gluten',     label:'Gluten',          emoji:'🌾' },
  { id:'crustaces',  label:'Crustacés',        emoji:'🦐' },
  { id:'oeufs',      label:'Œufs',             emoji:'🥚' },
  { id:'poissons',   label:'Poissons',         emoji:'🐟' },
  { id:'arachides',  label:'Arachides',        emoji:'🥜' },
  { id:'soja',       label:'Soja',             emoji:'🫘' },
  { id:'lait',       label:'Lait',             emoji:'🥛' },
  { id:'fruits_coq', label:'Fruits à coque',   emoji:'🌰' },
  { id:'celeri',     label:'Céleri',           emoji:'🌿' },
  { id:'moutarde',   label:'Moutarde',         emoji:'🌻' },
  { id:'sesame',     label:'Sésame',           emoji:'🌱' },
  { id:'sulfites',   label:'Sulfites',         emoji:'🍷' },
  { id:'lupin',      label:'Lupin',            emoji:'🌼' },
  { id:'gelatine',   label:'Gélatine',         emoji:'🧪' },
];

// Colonnes Sheets existantes (pour lecture)
const ALLERGENS_SHEETS = [
  { id:'fruits_coq', col:'Fruit a coque' },
  { id:'gelatine',   col:'Gelatine'      },
  { id:'gluten',     col:'Gluten'        },
  { id:'lait',       col:'Lait'          },
  { id:'oeufs',      col:'Oeuf'          },
];

let _apiCallId = 0;
let fiches = [];
let editingId = null;
// editStates : Map<allergeneId, 'oui'|'non'|'inconnu'>
let editStates = new Map();
let filterMode = 'tous';
let filterSelected = new Set();

function api(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'dlcCb_' + (++_apiCallId);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 20000);
    window[cbName] = (data) => { cleanup(); resolve(data); };
    function cleanup() { clearTimeout(timer); delete window[cbName]; if (script.parentNode) script.remove(); }
    script.onerror = () => { cleanup(); reject(new Error('Erreur réseau')); };
    const p = new URLSearchParams({ ...params, callback: cbName });
    script.src = API_URL + '?' + p.toString();
    document.head.appendChild(script);
  });
}

function toast(msg, isError=false) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Filtre ──
function setMode(mode, btn) {
  filterMode = mode;
  filterSelected = new Set();
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildFilterChips();
  renderList();
}

function buildFilterChips() {
  const wrap = document.getElementById('filter-chips-wrap');
  const label = document.getElementById('filter-label');
  if (filterMode === 'tous') { wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  label.textContent = filterMode === 'sans'
    ? 'Afficher les produits SANS ces allergènes :'
    : 'Afficher les produits AVEC ces allergènes :';
  document.getElementById('filter-chips').innerHTML = ALLERGENS.map(a => {
    const on = filterSelected.has(a.id);
    return `<div class="filter-chip ${on?'active':''}" onclick="toggleFilter('${a.id}',this)">${a.emoji} ${a.label}</div>`;
  }).join('');
}

function toggleFilter(id, el) {
  if (filterSelected.has(id)) { filterSelected.delete(id); el.classList.remove('active'); }
  else { filterSelected.add(id); el.classList.add('active'); }
  renderList();
}

// ── Rendu liste ──
function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  let items = q ? fiches.filter(f => f.nom.toLowerCase().includes(q)) : [...fiches];

  if (filterMode === 'sans' && filterSelected.size > 0) {
    items = items.filter(f =>
      [...filterSelected].every(id => f.states[id] !== 'oui')
    );
  } else if (filterMode === 'avec' && filterSelected.size > 0) {
    items = items.filter(f =>
      [...filterSelected].some(id => f.states[id] === 'oui')
    );
  }

  const filterInfo = filterSelected.size > 0 && filterMode !== 'tous' ? ' · filtre actif' : '';
  document.getElementById('stats').textContent =
    `${items.length} / ${fiches.length} fiche${fiches.length !== 1 ? 's' : ''}${filterInfo}`;

  const list = document.getElementById('list');
  if (!items.length) {
    list.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:6px">${q || filterSelected.size > 0 ? 'Aucun résultat' : 'Aucune fiche'}</div>
      <div style="font-size:12px">${q || filterSelected.size > 0 ? 'Essaie d\'autres critères' : 'Clique sur ＋ Nouveau pour créer une fiche'}</div>
    </div>`;
    return;
  }

  list.innerHTML = items.map(f => {
    // Afficher uniquement les allergènes connus (oui ou non), ignorer inconnu
    const presents = ALLERGENS.filter(a => f.states[a.id] === 'oui');
    const absents  = ALLERGENS.filter(a => f.states[a.id] === 'non');
    const inconnus = ALLERGENS.filter(a => !f.states[a.id] || f.states[a.id] === 'inconnu');

    const badgesOui = presents.map(a => `<span class="badge-oui">✗ ${a.emoji} ${a.label}</span>`).join('');
    const badgesNon = absents.map(a => `<span class="badge-non">✓ ${a.emoji} ${a.label}</span>`).join('');
    const badgesInc = inconnus.map(a => `<span class="badge-inconnu">? ${a.emoji} ${a.label}</span>`).join('');

    return `<div class="product-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-family:'Fraunces',serif;font-size:17px;font-weight:700">${f.nom}</div>
          ${f.patissier ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">👨‍🍳 ${f.patissier}</div>` : ''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;margin-left:10px">
          <button onclick="openEditModal('${f.id}')" style="padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--muted);">✏️</button>
          <button onclick="deleteFiche('${f.id}')" style="padding:5px 10px;background:transparent;border:1px solid rgba(255,64,64,.3);border-radius:6px;font-size:11px;color:var(--red);">🗑</button>
        </div>
      </div>
      ${presents.length ? `<div style="margin-bottom:6px"><div style="font-size:10px;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Contient :</div><div>${badgesOui}</div></div>` : ''}
      ${absents.length  ? `<div style="margin-bottom:6px"><div style="font-size:10px;color:var(--green);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Absent :</div><div>${badgesNon}</div></div>` : ''}
      ${inconnus.length ? `<div><div style="font-size:10px;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Inconnu :</div><div>${badgesInc}</div></div>` : ''}
      ${f.ingredients ? `<div style="font-size:11px;color:var(--muted);background:var(--bg);border-radius:6px;padding:6px 10px;margin-top:8px">📝 ${f.ingredients}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Modal ──
function buildChipsEdit() {
  document.getElementById('chips-edit').innerHTML = ALLERGENS.map(a => {
    const state = editStates.get(a.id) || 'inconnu';
    return `<div class="a-chip">
      <div class="a-chip-left">
        <span style="font-size:20px">${a.emoji}</span>
        <span class="a-chip-label">${a.label}</span>
      </div>
      <div class="a-chip-toggle">
        <button onclick="setState('${a.id}','non',this.parentElement)" class="${state==='non'?'sel-non':''}">✓</button>
        <button onclick="setState('${a.id}','oui',this.parentElement)" class="${state==='oui'?'sel-oui':''}">✗</button>
        <button onclick="setState('${a.id}','inconnu',this.parentElement)" class="${state==='inconnu'?'sel-inconnu':''}">?</button>
      </div>
    </div>`;
  }).join('');
}

function setState(id, state, toggleEl) {
  editStates.set(id, state);
  // Mettre à jour visuellement les 3 boutons
  const btns = toggleEl.querySelectorAll('button');
  btns[0].className = state === 'non'     ? 'sel-non' : '';
  btns[1].className = state === 'oui'     ? 'sel-oui' : '';
  btns[2].className = state === 'inconnu' ? 'sel-inconnu' : '';
}

function openAddModal() {
  editingId = null;
  editStates = new Map();
  ALLERGENS.forEach(a => editStates.set(a.id, 'inconnu'));
  document.getElementById('edit-nom').value = '';
  document.getElementById('edit-patissier').value = '';
  document.getElementById('modal-edit-title').textContent = '＋ Nouvelle fiche';
  buildChipsEdit();
  document.getElementById('modal-edit').style.display = 'flex';
  setTimeout(() => document.getElementById('edit-nom').focus(), 100);
}

function openEditModal(id) {
  const f = fiches.find(x => x.id === id);
  if (!f) return;
  editingId = id;
  editStates = new Map();
  ALLERGENS.forEach(a => editStates.set(a.id, f.states[a.id] || 'inconnu'));
  document.getElementById('edit-nom').value = f.nom;
  document.getElementById('edit-patissier').value = f.patissier || '';
  document.getElementById('modal-edit-title').textContent = '✏️ Modifier la fiche';
  buildChipsEdit();
  document.getElementById('modal-edit').style.display = 'flex';
}

function closeEditModal() { document.getElementById('modal-edit').style.display = 'none'; }

async function saveAllergens() {
  const nom = document.getElementById('edit-nom').value.trim();
  if (!nom) { toast('⚠ Le nom est obligatoire', true); return; }
  const patissier = document.getElementById('edit-patissier').value.trim();
  // Sérialiser les états : { gluten:'oui', lait:'non', ... }
  const statesObj = {};
  editStates.forEach((v, k) => statesObj[k] = v);
  toast('⏳ Enregistrement…');
  closeEditModal();
  try {
    const data = await api({
      action: editingId ? 'updateAllergenes' : 'saveAllergenes',
      id: editingId || '',
      nom, patissier,
      states: JSON.stringify(statesObj),
    });
    if (data && data.success) {
      toast(`✓ Fiche "${nom}" enregistrée`);
      await loadFiches();
    } else {
      toast(`⚠ ${data?.error || 'Mets à jour le Apps Script (action saveAllergenes)'}`, true);
    }
  } catch(e) { toast('⚠ Erreur réseau', true); }
}

async function deleteFiche(id) {
  const f = fiches.find(x => x.id === id);
  if (!f || !confirm(`Supprimer la fiche "${f.nom}" ?`)) return;
  try {
    const data = await api({ action:'deleteAllergenes', id });
    if (data && data.success) {
      fiches = fiches.filter(x => x.id !== id);
      renderList();
      toast('✓ Fiche supprimée');
    } else {
      toast(`⚠ ${data?.error || 'Erreur Apps Script'}`, true);
    }
  } catch(e) { toast('⚠ Erreur réseau', true); }
}

// ── Chargement depuis Sheets ──
async function loadFiches() {
  const list = document.getElementById('list');
  list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">⏳ Chargement…</div>';
  try {
    const data = await api({ action:'getAllergenes' });
    let raw = [];
    if (data.success && data.fiches) raw = data.fiches;

    fiches = raw.map((f, i) => {
      // Construire l'objet states depuis les données Sheets ou sauvegardées
      const states = {};
      ALLERGENS.forEach(a => {
        if (f.states && f.states[a.id]) {
          states[a.id] = f.states[a.id]; // données sauvegardées avec les 3 états
        } else if (f.allergenes && f.allergenes.includes(a.id)) {
          states[a.id] = 'oui'; // données Sheets (présent = oui)
        } else {
          // Colonnes Sheets connues → non, autres → inconnu
          const sheetCol = ALLERGENS_SHEETS.find(s => s.id === a.id);
          states[a.id] = sheetCol ? 'non' : 'inconnu';
        }
      });
      return {
        id: f.id || 'row_' + i,
        nom: f.nom || '',
        patissier: f.patissier || '',
        ingredients: f.ingredients || '',
        states,
      };
    });
    renderList();
  } catch(e) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">⚠ Impossible de charger — vérifie Apps Script</div>';
  }
}

loadFiches();
</script>

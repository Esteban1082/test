<!DOCTYPE html>

<head>
<meta http-equiv="Content-Security-Policy" content="default-src * blob: data:; script-src * 'unsafe-inline' 'unsafe-eval' blob:; style-src * 'unsafe-inline'; connect-src *; img-src * blob: data:; worker-src * blob:; media-src * blob:;">
<script>
// Guard — bloque l'accès si pas de permission
document.documentElement.style.visibility = 'hidden';
window.__guardPassed = undefined; // undefined = en cours, true = OK, false = bloqué

(async () => {
  const pm  = localStorage.getItem('pm_auth') === '1';
  const sl  = localStorage.getItem('sl_auth') === '1';
  const tok = localStorage.getItem('sl_access_token');

  function showBlock(title, sub) {
    document.documentElement.style.visibility = 'visible';
    // Attendre que le body existe
    const render = () => {
      if (!document.body) { requestAnimationFrame(render); return; }
      document.body.innerHTML = `<div style="position:fixed;inset:0;background:#0f0f0d;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;text-align:center;padding:20px"><div><div style="font-size:48px;margin-bottom:16px">🚫</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:#e8a045;margin-bottom:8px">${title}</div><div style="font-size:13px;color:#7a7a6e;margin-bottom:24px">${sub}</div><a href="index.html" style="padding:14px 28px;background:#e8a045;border-radius:12px;font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:#000;text-decoration:none">← Retour au hub</a></div></div>`;
    };
    render();
  }

  function allow() {
    window.__guardPassed = true;
    document.documentElement.style.visibility = 'visible';
  }

  // Pas connecté du tout
  if (!pm && !sl) {
    showBlock('Accès restreint', 'Connecte-toi depuis le hub');
    return;
  }

  // Connecté via Supabase → vérifier permission
  if (tok && sl) {
    const user = JSON.parse(localStorage.getItem('sl_user') || '{}');
    // Admin/superadmin → accès libre
    if (['superadmin','admin'].includes(user.role)) { allow(); return; }
    if (!user.id) { allow(); return; }
    try {
      const r = await fetch(
        'https://jeqptodorjzeyhapbmrz.supabase.co/rest/v1/permissions?user_id=eq.' + user.id + '&module=eq.documents&actif=eq.true&select=id',
        { headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcXB0b2Rvcmp6ZXloYXBibXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjI0ODksImV4cCI6MjA4OTIzODQ4OX0.j4JqeDnDMEghnBtKy5Knpb4QYDFEXiRtDeq7SSz3zWk', 'Authorization': 'Bearer ' + tok } }
      );
      const perms = await r.json();
      if (!Array.isArray(perms) || perms.length === 0) {
        showBlock('Module non activé', "Parle à Esteban pour obtenir l\'accès");
        return;
      }
      allow();
    } catch(e) { allow(); }
    return;
  }

  // PIN uniquement → accès libre
  allow();
})();
</script>

<title>Documents – Pâtisserie Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#0f0f0d; --surface:#1a1a16; --border:#2e2e28;
    --text:#f0ede4; --muted:#7a7a6e; --amber:#e8a045;
    --red:#ff4040; --green:#4cdb8a; --yellow:#f5c842; --blue:#4db8ff;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }
  button { transition:all .15s; cursor:pointer; }
  button:active { transform:scale(0.97); }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:100;
  }
  .logo-title { font-family:'Fraunces',serif; font-weight:900; font-size:20px; color:var(--amber); }
  .logo-sub   { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .back-btn {
    padding:7px 14px; background:transparent; border:1px solid var(--border);
    border-radius:8px; color:var(--muted); font-family:'DM Mono',monospace;
    font-size:11px; text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .back-btn:hover { border-color:var(--amber); color:var(--text); }

  .tabs {
    display:flex; border-bottom:1px solid var(--border);
    padding:0 24px; position:sticky; top:57px; background:var(--bg); z-index:99;
  }
  .tab {
    padding:14px 18px; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); border-bottom:2px solid transparent; cursor:pointer;
    transition:all .15s; background:none; border-top:none; border-left:none; border-right:none;
  }
  .tab.active { color:var(--amber); border-bottom-color:var(--amber); }

  .main { padding:20px 24px 80px; max-width:700px; margin:0 auto; }
  .view { display:none; }
  .view.active { display:block; }

  /* Checklists */
  .checklist-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:12px; overflow:hidden; }
  .checklist-header { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
  .checklist-header:hover { background:rgba(255,255,255,.02); }
  .check-item { display:flex; align-items:center; gap:12px; padding:11px 16px; border-top:1px solid var(--border); cursor:pointer; transition:background .15s; }
  .check-item:hover { background:rgba(255,255,255,.02); }
  .check-item.done .check-label { text-decoration:line-through; color:var(--muted); }
  .checkbox { width:22px; height:22px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
  .check-item.done .checkbox { background:var(--green); border-color:var(--green); }
  .progress-ring { width:36px; height:36px; border-radius:50%; flex-shrink:0; }

  /* Docs */
  .doc-row { display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; text-decoration:none; color:var(--text); transition:all .2s; }
  .doc-row:hover { border-color:var(--amber); }

  /* Contacts */
  .contact-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(4px); z-index:600; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:100%; max-width:440px; max-height:85vh; overflow-y:auto; }
  .modal-title { font-family:'Fraunces',serif; font-size:18px; font-weight:700; color:var(--amber); margin-bottom:16px; }
  .form-input { width:100%; padding:11px 14px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; margin-bottom:10px; transition:border-color .15s; }
  .form-input:focus { border-color:var(--amber); }
  .form-label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; display:block; }

  .sync-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; font-size:10px; border:1px solid var(--border); color:var(--muted); }
  .sync-badge.ok { border-color:rgba(76,219,138,.3); color:var(--green); }
  .sync-badge.loading { border-color:rgba(245,200,66,.3); color:var(--yellow); }

  .toast-container { position:fixed; bottom:24px; right:24px; z-index:700; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; animation:slideIn .2s ease; max-width:300px; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:none;opacity:1} }
  .version-tag { position:fixed; bottom:10px; left:14px; font-size:10px; color:var(--border); letter-spacing:1px; z-index:50; }
</style>
</head>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz425iBOjYC8raof6W44y0IcJlCZHzjOrMzzjw0ju8uXFCKvFSl-xmYi9tZvOoSvP0aZg/exec";
let _apiCallId = 0;

// Données en mémoire
let checklists = [];
let docs = [];
let contacts = [];
// États des cases (reset chaque jour) — stockés localement avec date
let checkStates = {}; // { 'cl_id:task_id': true/false }
const todayKey = new Date().toISOString().split('T')[0];

function api(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'dlcCb_' + (++_apiCallId);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 20000);
    window[cbName] = (data) => { cleanup(); resolve(data); };
    function cleanup() { clearTimeout(timer); delete window[cbName]; if (script.parentNode) script.remove(); }
    script.onerror = () => { cleanup(); reject(new Error('Erreur réseau')); };
    const p = new URLSearchParams({ ...params, callback: cbName });
    script.src = API_URL + '?' + p.toString();
    document.head.appendChild(script);
  });
}

function toast(msg, isError=false) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function setSyncBadge(state) {
  const b = document.getElementById('sync-badge');
  if (state === 'ok') { b.className = 'sync-badge ok'; b.textContent = '✓ Sync'; }
  else if (state === 'loading') { b.className = 'sync-badge loading'; b.textContent = '⟳ Sync…'; }
  else { b.className = 'sync-badge'; b.textContent = '⟳ Sync'; }
}

// ── Navigation ──
function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  btn.classList.add('active');
}

// ── États cases (local, reset quotidien) ──
function loadCheckStates() {
  try {
    const saved = localStorage.getItem('pm_checkstates_' + todayKey);
    checkStates = saved ? JSON.parse(saved) : {};
  } catch(e) { checkStates = {}; }
  // Nettoyer les vieux états
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('pm_checkstates_') && !k.endsWith(todayKey)) localStorage.removeItem(k);
    });
  } catch(e) {}
}

function saveCheckStates() {
  try { localStorage.setItem('pm_checkstates_' + todayKey, JSON.stringify(checkStates)); } catch(e) {}
}

// ═══════════════════ CHECKLISTS ═══════════════════
function renderChecklists() {
  const el = document.getElementById('checklists-container');
  if (!checklists.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Aucune checklist.<br>Clique sur ＋ Liste pour en créer une.</div>';
    return;
  }
  el.innerHTML = checklists.map(cl => {
    const tasks = cl.tasks || [];
    const done = tasks.filter(t => checkStates[cl.id+':'+t.id]).length;
    const pct  = tasks.length ? Math.round(done / tasks.length * 100) : 0;
    const color = pct === 100 ? 'var(--green)' : pct > 0 ? 'var(--yellow)' : 'var(--muted)';
    return `<div class="checklist-card">
      <div class="checklist-header">
        <div>
          <div style="font-family:'Fraunces',serif;font-size:16px;font-weight:700">${cl.nom}</div>
          <div style="font-size:11px;color:${color};margin-top:3px">${done}/${tasks.length} · ${pct === 100 ? '✓ Terminé !' : pct > 0 ? 'En cours' : 'À faire'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <svg class="progress-ring" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15" fill="none" stroke="var(--border)" stroke-width="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke="${color}" stroke-width="3"
              stroke-dasharray="${pct * 0.942} 94.2" stroke-dashoffset="23.55" stroke-linecap="round" transform="rotate(-90 18 18)"/>
            <text x="18" y="22" text-anchor="middle" fill="${color}" font-size="9" font-family="DM Mono,monospace">${pct}%</text>
          </svg>
          <button onclick="deleteChecklist('${cl.id}',event)" style="padding:5px 8px;background:transparent;border:1px solid rgba(255,64,64,.3);border-radius:6px;font-size:11px;color:var(--red);">🗑</button>
        </div>
      </div>
      ${tasks.map(t => {
        const isDone = !!checkStates[cl.id+':'+t.id];
        return `<div class="check-item ${isDone?'done':''}" onclick="toggleTask('${cl.id}','${t.id}')">
          <div class="checkbox">${isDone?'<span style="color:#000;font-size:14px;font-weight:900">✓</span>':''}</div>
          <span class="check-label" style="font-size:14px">${t.label}</span>
        </div>`;
      }).join('')}
      <div style="padding:8px 16px;border-top:1px solid var(--border)">
        <button onclick="openAddTask('${cl.id}')"
          style="width:100%;padding:7px;background:transparent;border:1px dashed var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);">
          ＋ Ajouter une tâche
        </button>
      </div>
    </div>`;
  }).join('');
}

function toggleTask(clId, taskId) {
  const key = clId + ':' + taskId;
  checkStates[key] = !checkStates[key];
  saveCheckStates();
  renderChecklists();
}

async function deleteChecklist(id, e) {
  e.stopPropagation();
  if (!confirm('Supprimer cette checklist ?')) return;
  checklists = checklists.filter(c => c.id !== id);
  renderChecklists();
  try { await api({ action:'deleteChecklist', id }); } catch(e) {}
}

function resetAllChecklists() {
  if (!confirm('Remettre toutes les tâches à zéro ?')) return;
  checkStates = {};
  saveCheckStates();
  renderChecklists();
  toast('✓ Checklists remises à zéro');
}

function openAddTask(clId) {
  const label = prompt('Nom de la tâche :');
  if (!label || !label.trim()) return;
  const cl = checklists.find(c => c.id === clId);
  if (!cl) return;
  if (!cl.tasks) cl.tasks = [];
  const task = { id:'t_'+Date.now(), label:label.trim() };
  cl.tasks.push(task);
  renderChecklists();
  // Sauver dans Sheets
  api({ action:'saveChecklist', id:cl.id, nom:cl.nom, tasks:JSON.stringify(cl.tasks) }).catch(()=>{});
}

function openAddChecklist() {
  document.getElementById('cl-nom').value = '';
  document.getElementById('cl-tasks').value = '';
  document.getElementById('modal-checklist').style.display = 'flex';
  setTimeout(() => document.getElementById('cl-nom').focus(), 100);
}
function closeChecklistModal() { document.getElementById('modal-checklist').style.display = 'none'; }

async function saveChecklist() {
  const nom = document.getElementById('cl-nom').value.trim();
  if (!nom) { toast('⚠ Le nom est obligatoire', true); return; }
  const lines = document.getElementById('cl-tasks').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const tasks = lines.map((l,i) => ({ id:'t_'+Date.now()+i, label:l }));
  const id = 'cl_' + Date.now();
  checklists.push({ id, nom, tasks });
  renderChecklists();
  closeChecklistModal();
  toast(`✓ Checklist "${nom}" créée`);
  try { await api({ action:'saveChecklist', id, nom, tasks:JSON.stringify(tasks) }); }
  catch(e) { toast('⚠ Erreur sauvegarde Sheets', true); }
}

// ═══════════════════ DOCUMENTS ═══════════════════
const DOC_ICONS  = { hygiene:'🧼', procedure:'📋', fiche:'📄', autre:'📁' };
const DOC_LABELS = { hygiene:'Hygiène HACCP', procedure:'Procédure', fiche:'Fiche produit', autre:'Autre' };

function renderDocs() {
  const el = document.getElementById('docs-container');
  if (!docs.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Aucun document. Clique sur ＋ Ajouter.</div>';
    return;
  }
  const byCategorie = {};
  docs.forEach(d => { if (!byCategorie[d.categorie]) byCategorie[d.categorie]=[]; byCategorie[d.categorie].push(d); });
  let html = '';
  for (const [cat, items] of Object.entries(byCategorie)) {
    html += `<div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px">
      ${DOC_ICONS[cat]||'📁'} ${DOC_LABELS[cat]||cat}
      <span style="flex:1;height:1px;background:var(--border)"></span>
    </div>`;
    html += items.map(d => `
      <div class="doc-row" ${d.url?`onclick="window.open('${d.url}','_blank')" style="cursor:pointer"`:''}>
        <div style="font-size:22px;flex-shrink:0">${DOC_ICONS[d.categorie]||'📄'}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${d.titre}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${d.url?'🔗 Lien disponible':'⚠ Pas de lien'}</div>
        </div>
        <button onclick="event.stopPropagation();deleteDoc('${d.id}')" style="padding:5px 8px;background:transparent;border:1px solid rgba(255,64,64,.3);border-radius:6px;font-size:11px;color:var(--red);flex-shrink:0">🗑</button>
      </div>`).join('');
  }
  el.innerHTML = html;
}

function openAddDoc() {
  ['doc-titre','doc-url'].forEach(id => document.getElementById(id).value='');
  document.getElementById('modal-doc').style.display='flex';
  setTimeout(() => document.getElementById('doc-titre').focus(), 100);
}
function closeDocModal() { document.getElementById('modal-doc').style.display='none'; }

async function saveDoc() {
  const titre = document.getElementById('doc-titre').value.trim();
  if (!titre) { toast('⚠ Le titre est obligatoire', true); return; }
  const doc = { id:'d_'+Date.now(), titre, url:document.getElementById('doc-url').value.trim(), categorie:document.getElementById('doc-categorie').value };
  docs.push(doc);
  renderDocs();
  closeDocModal();
  toast(`✓ "${titre}" ajouté`);
  try { await api({ action:'saveDocument', ...doc }); }
  catch(e) { toast('⚠ Erreur sauvegarde Sheets', true); }
}

async function deleteDoc(id) {
  if (!confirm('Supprimer ce document ?')) return;
  docs = docs.filter(d => d.id !== id);
  renderDocs();
  try { await api({ action:'deleteDocument', id }); } catch(e) {}
}

// ═══════════════════ CONTACTS ═══════════════════
function renderContacts() {
  const el = document.getElementById('contacts-container');
  if (!contacts.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Aucun contact. Clique sur ＋ Ajouter.</div>';
    return;
  }
  el.innerHTML = contacts.map(c => `
    <div class="contact-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <div style="font-family:'Fraunces',serif;font-size:16px;font-weight:700;margin-bottom:8px">${c.nom}</div>
          ${c.tel   ? `<a href="tel:${c.tel}" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--blue);text-decoration:none;margin-bottom:4px">📞 ${c.tel}</a>` : ''}
          ${c.email ? `<a href="mailto:${c.email}" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--amber);text-decoration:none;margin-bottom:4px">✉️ ${c.email}</a>` : ''}
          ${c.note  ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">ℹ️ ${c.note}</div>` : ''}
        </div>
        <button onclick="deleteContact('${c.id}')" style="padding:5px 8px;background:transparent;border:1px solid rgba(255,64,64,.3);border-radius:6px;font-size:11px;color:var(--red);flex-shrink:0;margin-left:10px">🗑</button>
      </div>
    </div>`).join('');
}

function openAddContact() {
  ['contact-nom','contact-tel','contact-email','contact-note'].forEach(id => document.getElementById(id).value='');
  document.getElementById('modal-contact').style.display='flex';
  setTimeout(() => document.getElementById('contact-nom').focus(), 100);
}
function closeContactModal() { document.getElementById('modal-contact').style.display='none'; }

async function saveContact() {
  const nom = document.getElementById('contact-nom').value.trim();
  if (!nom) { toast('⚠ Le nom est obligatoire', true); return; }
  const contact = { id:'c_'+Date.now(), nom, tel:document.getElementById('contact-tel').value.trim(), email:document.getElementById('contact-email').value.trim(), note:document.getElementById('contact-note').value.trim() };
  contacts.push(contact);
  renderContacts();
  closeContactModal();
  toast(`✓ "${nom}" ajouté`);
  try { await api({ action:'saveContact', ...contact }); }
  catch(e) { toast('⚠ Erreur sauvegarde Sheets', true); }
}

async function deleteContact(id) {
  if (!confirm('Supprimer ce contact ?')) return;
  contacts = contacts.filter(c => c.id !== id);
  renderContacts();
  try { await api({ action:'deleteContact', id }); } catch(e) {}
}

// ═══════════════════ INIT & SYNC ═══════════════════
async function loadFromSheets() {
  setSyncBadge('loading');
  try {
    const data = await api({ action:'getDocuments' });
    if (data.success) {
      checklists = data.checklists || [];
      docs       = data.docs       || [];
      contacts   = data.contacts   || [];
    }
    setSyncBadge('ok');
  } catch(e) {
    setSyncBadge('error');
    toast('⚠ Impossible de charger depuis Sheets', true);
  }
  renderChecklists();
  renderDocs();
  renderContacts();
}

loadCheckStates();
// Attendre que le guard soit résolu ET que le DOM soit prêt
function _runWhenReady() {
  if (window.__guardPassed === true) {
    loadFromSheets();
  } else if (window.__guardPassed === false) {
    // Bloqué — ne rien faire
  } else {
    // Guard encore en cours — réessayer
    setTimeout(_runWhenReady, 50);
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _runWhenReady);
} else {
  _runWhenReady();
}
</script>
